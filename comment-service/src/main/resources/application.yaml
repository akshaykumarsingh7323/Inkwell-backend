server:
  port: ${SERVER_PORT_COMMENT:8083}

springdoc:
  api-docs:
    enabled: true
    path: /comments/v3/api-docs
  swagger-ui:
    disable-swagger-default-url: true
  override-with-generic-response: false

spring:
  config:
    import: "optional:file:../.env[.properties]"
  application:
    name: comment-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/comment_db?createDatabaseIfNotExist=true
    username: ${COMMENT_DB_USERNAME}
    password: ${COMMENT_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

comment:
  auto-approve: ${COMMENT_AUTO_APPROVE:true}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: false
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false
    rabbitmq:
      enabled: false
    redis:
      enabled: false

