server:
  port: ${SERVER_PORT_MEDIA:8085}

springdoc:
  api-docs:
    enabled: true
    path: /media/v3/api-docs
  swagger-ui:
    disable-swagger-default-url: true
  override-with-generic-response: false

spring:
  config:
    import: "optional:file:../.env[.properties]"
  application:
    name: media-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/media_db?createDatabaseIfNotExist=true
    username: ${MEDIA_DB_USERNAME}
    password: ${MEDIA_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-south-1}
  bucket-name: ${AWS_BUCKET_NAME:inkwell-media-post-storage}

media:
  allowed-types: image/jpeg,image/png,image/gif,image/webp,application/pdf
  max-size-bytes: 10485760 # 10MB
  local-path: ${MEDIA_LOCAL_PATH:./uploads}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

