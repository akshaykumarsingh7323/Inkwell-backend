server:
  port: ${SERVER_PORT_NEWSLETTER:8086}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}

springdoc:
  api-docs:
    enabled: true
    path: /newsletter/v3/api-docs
  swagger-ui:
    disable-swagger-default-url: true
  override-with-generic-response: false

spring:
  config:
    import: "optional:file:../.env[.properties]"
  application:
    name: newsletter-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/newsletter_db?createDatabaseIfNotExist=true
    username: ${NEWSLETTER_DB_USERNAME}
    password: ${NEWSLETTER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: false
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
    rabbit:
      enabled: false
    rabbitmq:
      enabled: false
    redis:
      enabled: false

